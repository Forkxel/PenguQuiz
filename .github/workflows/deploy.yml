name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/PenguQuiz
            git fetch origin
            git reset --hard origin/master

            dotnet publish QuizAPI/QuizAPI.csproj -c Release -o /var/www/penguquiz/api
            dotnet publish PenguQuiz/PenguQuiz.csproj -c Release -o /var/www/penguquiz/frontend

            rm -rf /var/www/penguquiz/site/*
            cp -r /var/www/penguquiz/frontend/wwwroot/* /var/www/penguquiz/site/

            systemctl restart penguquiz-api
            systemctl reload nginx
