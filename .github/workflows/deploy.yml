name: Deploy and Release

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://penguquiz.com

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release name
        run: |
          echo "RELEASE_NAME=release-$(date -u +%Y%m%dT%H%M%SZ)" >> $GITHUB_ENV

      - name: Create source archive
        run: |
          git archive --format=tar.gz -o penguquiz-source.tar.gz HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          name: PenguQuiz ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          files: penguquiz-source.tar.gz

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/PenguQuiz
            git pull

            dotnet publish QuizAPI/QuizAPI.csproj -c Release -o /var/www/penguquiz/api
            dotnet publish PenguQuiz/PenguQuiz.csproj -c Release -o /var/www/penguquiz/frontend

            rm -rf /var/www/penguquiz/site/*
            cp -r /var/www/penguquiz/frontend/wwwroot/* /var/www/penguquiz/site/

            systemctl restart penguquiz-api
            systemctl reload nginx
